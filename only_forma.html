<!DOCTYPE html>
<html>
    <head>
        
    </head>
    <body>
        

<!-- ФОРМА ОБРАТНОЙ СВЯЗИ -->
<div style="margin-top: 10px; background: rgba(250, 242, 230, 0.5); padding: 15px 30px; border-radius: 40px; backdrop-filter: blur(2px);">

<p style="font-size: 1.1rem; margin: 0 0 12px 0; padding: 0; background: transparent;">Напишите нам!</p>
  
  <form action="https://formsubmit.co/riviere-oka@mail.ru" method="POST">
    <!-- Скрытые поля (не видны пользователю) -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="Новое сообщение с сайта riviere-oka.ru!">
    
    <!-- Поле: текст сообщения -->
    <div style="margin-bottom: 18px;">
      <label for="message" style="display: block; font-weight: 500; margin-bottom: 4px;">💬 Текст вашего сообщения</label>
      <textarea id="message" name="Сообщение" rows="4" placeholder="Напишите, что вас интересует..." required
                style="width: 100%; padding: 12px 18px; border-radius: 24px; border: 1px solid #dac09a; background: rgba(255, 248, 240, 0.7); font-size: 1rem; resize: vertical;"></textarea>
    </div>

    <!-- Поле: почта -->
    <div style="margin-bottom: 14px;">
      <label for="email" style="display: block; font-weight: 500; margin-bottom: 4px;">✉️ На какую почту вам ответить</label>
      <input type="email" id="email" name="Почта для ответа" placeholder="ваша@почта.ru" required
             style="width: 100%; padding: 10px 18px; border-radius: 40px; border: 1px solid #dac09a; background: rgba(255, 248, 240, 0.7); font-size: 1rem;">
    </div>
    
    <!-- Кнопка отправки -->
    <button type="submit" 
            style="background: #dac09a; color: #3b4d3e; border: none; padding: 12px 40px; border-radius: 60px; font-size: 1.1rem; font-weight: 500; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 12px rgba(160, 130, 90, 0.15);">
      📨 Отправить
    </button>
    
    <p style="margin-top: 12px; font-size: 0.9rem; opacity: 0.7; background: transparent; padding-left: 0;">
      Мы ответим вам в ближайшее время 😊
    </p>
  </form>


</div>


    </body>
</html>
